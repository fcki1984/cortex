# For local development — builds from source instead of pulling pre-built image
services:
  cortex:
    build: .
    ports:
      - "21100:21100"
    volumes:
      - cortex-data:/app/cortex
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - CORTEX_PORT=21100
      - CORTEX_HOST=0.0.0.0
      - CORTEX_DB_PATH=cortex/brain.db
      - CORTEX_LLM_EXTRACTION_PROVIDER=${CORTEX_LLM_EXTRACTION_PROVIDER:-}
      - CORTEX_LLM_EXTRACTION_MODEL=${CORTEX_LLM_EXTRACTION_MODEL:-}
      - CORTEX_LLM_EXTRACTION_API_KEY=${CORTEX_LLM_EXTRACTION_API_KEY:-}
      - CORTEX_LLM_EXTRACTION_BASE_URL=${CORTEX_LLM_EXTRACTION_BASE_URL:-}
      - CORTEX_LLM_LIFECYCLE_PROVIDER=${CORTEX_LLM_LIFECYCLE_PROVIDER:-}
      - CORTEX_LLM_LIFECYCLE_MODEL=${CORTEX_LLM_LIFECYCLE_MODEL:-}
      - CORTEX_LLM_LIFECYCLE_API_KEY=${CORTEX_LLM_LIFECYCLE_API_KEY:-}
      - CORTEX_LLM_LIFECYCLE_BASE_URL=${CORTEX_LLM_LIFECYCLE_BASE_URL:-}
      - CORTEX_EMBEDDING_PROVIDER=${CORTEX_EMBEDDING_PROVIDER:-}
      - CORTEX_EMBEDDING_MODEL=${CORTEX_EMBEDDING_MODEL:-}
      - CORTEX_EMBEDDING_API_KEY=${CORTEX_EMBEDDING_API_KEY:-}
      - CORTEX_EMBEDDING_BASE_URL=${CORTEX_EMBEDDING_BASE_URL:-}
      - CORTEX_EMBEDDING_DIMENSIONS=${CORTEX_EMBEDDING_DIMENSIONS:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}
      - CORTEX_AUTH_TOKEN=${CORTEX_AUTH_TOKEN:-}
      - LOG_LEVEL=info
      - TZ=Asia/Tokyo
    restart: unless-stopped

volumes:
  cortex-data:
